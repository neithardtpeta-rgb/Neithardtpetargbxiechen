name: Auto Deploy to GitHub Pages
on:
  push:
    branches: [ main ]  # 监听 main 分支提交
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      # 核心修复：不依赖锁文件，直接安装依赖
      - name: Install Dependencies
        run: npm install --force  # 强制安装，解决 Figma 依赖冲突
      
      # 适配 Vite 项目构建，设置正确的基础路径
      - name: Build Project
        run: |
          npm run build -- --base=/Neithardtpetargbxiechen/
      
      # 部署到 GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist  # Vite 构建产物默认在 dist，不是 build！（之前的核心错误）
